<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Fintech Wallet - Login</title>
  <style>
    body { font-family: sans-serif; max-width: 400px; margin: 80px auto; padding: 0 20px; }
    h1 { color: #1a1a2e; }
    input { display: block; width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    button { width: 100%; padding: 12px; background: #4f46e5; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
    button:hover { background: #4338ca; }
    .error { color: #dc2626; margin-top: 10px; }
    .success { color: #16a34a; margin-top: 10px; }
  </style>
</head>
<body>
  <h1>Fintech Wallet</h1>
  <h2>Sign in</h2>

  <form id="login-form" data-testid="login-form">
    <input
      data-testid="email-input"
      name="email"
      type="email"
      placeholder="Email"
      required
    />
    <input
      data-testid="password-input"
      name="password"
      type="password"
      placeholder="Password"
      required
    />
    <button data-testid="submit-button" type="submit">Sign in</button>
  </form>

  <p data-testid="error-message" class="error" style="display:none"></p>
  <p data-testid="success-message" class="success" style="display:none"></p>

  <script>
    if (localStorage.getItem('token')) {
      window.location.href = '/dashboard.html';
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = e.target.email.value;
      const password = e.target.password.value;

      const errorEl = document.querySelector('[data-testid="error-message"]');
      const successEl = document.querySelector('[data-testid="success-message"]');

      errorEl.style.display = 'none';
      successEl.style.display = 'none';

      const res = await fetch('/api/v1/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });

      const data = await res.json();

      if (res.ok && data.token) {
        localStorage.setItem('token', data.token);
        successEl.textContent = 'Login successful';
        successEl.style.display = 'block';
        window.location.href = '/dashboard.html';
      } else {
        errorEl.textContent = 'Invalid email or password';
        errorEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
